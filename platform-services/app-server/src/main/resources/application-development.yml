### --------------------------------------------------------------------------------------------------------------------
### Spring Config
### --------------------------------------------------------------------------------------------------------------------
spring:
    boot:
        admin:
            client:
                enabled: false
                url: http://127.0.0.1:8282
                username: admin
                password: admin
                api-path: /devops/sba/instances
                auto-registration: false
    datasource:
        master:
            name: master
            type: com.zaxxer.hikari.HikariDataSource
            driver-class-name: org.postgresql.Driver
            url: jdbc:postgresql://127.0.0.1:5432/ee_platform
            username: root
            password: root
        slave:
            name: slave
            type: com.zaxxer.hikari.HikariDataSource
            driver-class-name: org.postgresql.Driver
            url: jdbc:postgresql://127.0.0.1:5432/ee_platform
            username: root
            password: root
        job:
            name: job
            type: com.zaxxer.hikari.HikariDataSource
            driver-class-name: org.postgresql.Driver
            url: jdbc:postgresql://127.0.0.1:5432/ee_quartz
            username: root
            password: root
    data:
        redis:
            host: 127.0.0.1
            port: 6379
            database: 11
            password: redis
    rabbitmq:
        host: localhost
        port: 5672
        virtual-host: ee
        username: admin
        password: admin
        publisher-confirm-type: correlated
        publisher-returns: true
        listener:
            simple:
                acknowledge-mode: auto
                retry:
                    enabled: true
                default-requeue-rejected: true
    elasticsearch:
        uris: http://175.178.92.42:9200
        username: elastic
        password: elastic
    quartz:
        scheduler-name: QuartzScheduler
        properties:
            org:
                quartz:
                    scheduler:
                        instanceId: ${spring.application.name}_${server.port}
    ai:
        mcp:
            server:
                enabled: true
                name: ee-mcp-server
                version: 1.0.0
                type: sync
                protocol: streamable
                streamable-http:
                    mcp-endpoint: /api/mcp
                    keep-alive-interval: 30s
### --------------------------------------------------------------------------------------------------------------------
### Spring Extension Config
### --------------------------------------------------------------------------------------------------------------------
springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        enabled: true
cosid:
    enabled: true
    namespace: ${spring.application.name}
    machine:
        enabled: true
        distributor:
            type: manual
            manual:
                machine-id: 1
        guarder:
            enabled: true
    snowflake:
        enabled: true
        epoch: 1672502400000
